name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build - ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          key: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          BINARY=infradrift
          TAG=${GITHUB_REF#refs/tags/}
          ARCHIVE="${BINARY}-${TAG}-${{ matrix.target }}"

          mkdir -p "${ARCHIVE}"
          cp "target/${{ matrix.target }}/release/${BINARY}" "${ARCHIVE}/"
          cp LICENSE README.md "${ARCHIVE}/"
          tar czf "${ARCHIVE}.tar.gz" "${ARCHIVE}"
          echo "ARCHIVE=${ARCHIVE}.tar.gz" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: ${{ matrix.target }}
          path: ${{ env.ARCHIVE }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts

      - name: Collect archives
        run: |
          mkdir -p release-assets
          cp artifacts/**/*.tar.gz release-assets/

      - name: Compute SHA256 checksums
        run: |
          cd release-assets
          sha256sum *.tar.gz > checksums.txt
          cat checksums.txt

      - name: Create release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1
        with:
          generate_release_notes: true
          files: |
            release-assets/*.tar.gz
            release-assets/checksums.txt

  homebrew:
    name: Update Homebrew Tap
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          egress-policy: audit

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
        with:
          app-id: ${{ vars.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
          owner: eukarya-inc
          repositories: homebrew-tap

      - name: Download macOS artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts
          pattern: "*-apple-darwin"

      - name: Download Linux artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts
          pattern: "*-unknown-linux-gnu"

      - name: Generate Homebrew formula
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          VERSION=${TAG#v}
          REPO="eukarya-inc/infradrift"

          SHA_MAC_X86=$(sha256sum artifacts/x86_64-apple-darwin/*.tar.gz | awk '{print $1}')
          SHA_MAC_ARM=$(sha256sum artifacts/aarch64-apple-darwin/*.tar.gz | awk '{print $1}')
          SHA_LINUX_X86=$(sha256sum artifacts/x86_64-unknown-linux-gnu/*.tar.gz | awk '{print $1}')
          SHA_LINUX_ARM=$(sha256sum artifacts/aarch64-unknown-linux-gnu/*.tar.gz | awk '{print $1}')

          cat > infradrift.rb <<'FORMULA'
          class Infradrift < Formula
            desc "Detect infrastructure drift from Terraform/OpenTofu plans"
            homepage "https://github.com/eukarya-inc/infradrift"
            license "MIT"

            on_macos do
              if Hardware::CPU.intel?
                url "https://github.com/REPO/releases/download/TAG/infradrift-TAG-x86_64-apple-darwin.tar.gz"
                sha256 "SHA_MAC_X86"
              end
              if Hardware::CPU.arm?
                url "https://github.com/REPO/releases/download/TAG/infradrift-TAG-aarch64-apple-darwin.tar.gz"
                sha256 "SHA_MAC_ARM"
              end
            end

            on_linux do
              if Hardware::CPU.intel?
                url "https://github.com/REPO/releases/download/TAG/infradrift-TAG-x86_64-unknown-linux-gnu.tar.gz"
                sha256 "SHA_LINUX_X86"
              end
              if Hardware::CPU.arm?
                url "https://github.com/REPO/releases/download/TAG/infradrift-TAG-aarch64-unknown-linux-gnu.tar.gz"
                sha256 "SHA_LINUX_ARM"
              end
            end

            def install
              bin.install "infradrift"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/infradrift --version")
            end
          end
          FORMULA

          # Remove heredoc indentation and substitute placeholders
          sed -i 's/^          //' infradrift.rb
          sed -i "s|REPO|${REPO}|g" infradrift.rb
          sed -i "s|TAG|${TAG}|g" infradrift.rb
          sed -i "s|SHA_MAC_X86|${SHA_MAC_X86}|g" infradrift.rb
          sed -i "s|SHA_MAC_ARM|${SHA_MAC_ARM}|g" infradrift.rb
          sed -i "s|SHA_LINUX_X86|${SHA_LINUX_X86}|g" infradrift.rb
          sed -i "s|SHA_LINUX_ARM|${SHA_LINUX_ARM}|g" infradrift.rb

          cat infradrift.rb

      - name: Push to Homebrew tap
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          git clone "https://x-access-token:${GH_TOKEN}@github.com/eukarya-inc/homebrew-tap.git" tap
          mkdir -p tap/Formula
          cp infradrift.rb tap/Formula/infradrift.rb
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          TAG=${GITHUB_REF#refs/tags/}
          git add Formula/infradrift.rb
          git diff --cached --quiet || {
            git commit -m "Update infradrift to ${TAG}"
            git push
          }
